<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星力強化模擬器</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: inline-block; width: 200px; }
        .input-group input { width: 150px; }
        #results, #log { margin-top: 20px; white-space: pre-wrap; }
        textarea { width: 100%; height: 200px; }
        button { margin-top: 10px; padding: 10px 20px; }
        select { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>星力強化模擬器</h1>
    
    <!-- 輸入表單 -->
    <h2>輸入參數</h2>
    <div class="input-group">
        <label>多少楓點 = 1億楓幣:</label>
        <input type="number" id="pointsPerBillion" value="6" min="1" step="1">
    </div>
    <div class="input-group">
        <label>裝備補償價格（楓幣）:</label>
        <input type="number" id="equipCompensationMaple" value="3000000000" min="0" step="1" oninput="updateEquipCompensation()">
        <label>或（幾億楓幣）:</label>
        <input type="number" id="equipCompensationBillion" value="30" min="0" step="0.01" oninput="updateEquipCompensation()">
    </div>
    <div class="input-group">
        <label>15星卷價格（楓幣）:</label>
        <input type="number" id="scroll15Maple" value="81555555" min="0" step="1" oninput="updateScrollPrice(15)">
        <label>或（幾億楓幣）:</label>
        <input type="number" id="scroll15Billion" value="0.81555555" min="0" step="0.01" oninput="updateScrollPrice(15)">
    </div>
    <div class="input-group">
        <label>16星卷價格（楓幣）:</label>
        <input type="number" id="scroll16Maple" value="244444444" min="0" step="1" oninput="updateScrollPrice(16)">
        <label>或（幾億楓幣）:</label>
        <input type="number" id="scroll16Billion" value="2.44444444" min="0" step="0.01" oninput="updateScrollPrice(16)">
    </div>
    <div class="input-group">
        <label>17星卷價格（楓幣）:</label>
        <input type="number" id="scroll17Maple" value="2396666666" min="0" step="1" oninput="updateScrollPrice(17)">
        <label>或（幾億楓幣）:</label>
        <input type="number" id="scroll17Billion" value="23.96666666" min="0" step="0.01" oninput="updateScrollPrice(17)">
    </div>
    <div class="input-group">
        <label>18星卷價格（楓幣）:</label>
        <input type="number" id="scroll18Maple" value="5466666666" min="0" step="1" oninput="updateScrollPrice(18)">
        <label>或（幾億楓幣）:</label>
        <input type="number" id="scroll18Billion" value="54.66666666" min="0" step="0.01" oninput="updateScrollPrice(18)">
    </div>
    <div class="input-group">
        <label>19星卷價格（楓幣）:</label>
        <input type="number" id="scroll19Maple" value="17776888888" min="0" step="1" oninput="updateScrollPrice(19)">
        <label>或（幾億楓幣）:</label>
        <input type="number" id="scroll19Billion" value="177.76888888" min="0" step="0.01" oninput="updateScrollPrice(19)">
    </div>
    <div class="input-group">
        <label>20星卷價格（楓幣）:</label>
        <input type="number" id="scroll20Maple" value="48888888888" min="0" step="1" oninput="updateScrollPrice(20)">
        <label>或（幾億楓幣）:</label>
        <input type="number" id="scroll20Billion" value="488.88888888" min="0" step="0.01" oninput="updateScrollPrice(20)">
    </div>
    <button onclick="runSimulation()">開始模擬</button>

    <!-- 結果顯示 -->
    <h2>模擬結果</h2>
    <div id="results"></div>
    <h2>模擬日誌</h2>
    <select id="strategySelect" onchange="updateLog()">
        <option value="">請選擇策略</option>
    </select>
    <textarea id="log" readonly></textarea>

    <script>
        // 儲存所有策略的日誌
        let strategyLogs = {};

        // 同步楓幣與幾億楓幣輸入
        function updateEquipCompensation() {
            const mapleInput = document.getElementById('equipCompensationMaple');
            const billionInput = document.getElementById('equipCompensationBillion');
            if (event.target === mapleInput) {
                billionInput.value = (parseFloat(mapleInput.value) / 1e8).toFixed(8);
            } else {
                mapleInput.value = Math.round(parseFloat(billionInput.value) * 1e8);
            }
        }

        function updateScrollPrice(star) {
            const mapleInput = document.getElementById(`scroll${star}Maple`);
            const billionInput = document.getElementById(`scroll${star}Billion`);
            if (event.target === mapleInput) {
                billionInput.value = (parseFloat(mapleInput.value) / 1e8).toFixed(8);
            } else {
                mapleInput.value = Math.round(parseFloat(billionInput.value) * 1e8);
            }
        }

        // 機率表
        function getProbabilities(eventActive = true) {
            const baseProbabilities = {
                15: { success: 0.3000, destroy: 0.1050, drop: 0.0000, hold: 0.5950 },
                16: { success: 0.3000, destroy: 0.1400, drop: 0.5600, hold: 0.0000 },
                17: { success: 0.3000, destroy: 0.2100, drop: 0.4900, hold: 0.0000 },
                18: { success: 0.3000, destroy: 0.2800, drop: 0.4200, hold: 0.0000 },
                19: { success: 0.3000, destroy: 0.2800, drop: 0.4200, hold: 0.0000 },
            };
            if (eventActive) {
                baseProbabilities[15] = { success: 1.0000, destroy: 0.0000, drop: 0.0000, hold: 0.0000 };
            }
            return baseProbabilities;
        }

        // 模擬函數
        function simulateFromStart(startStar, restartStar, protectStart = null, buyBackThreshold = null, specialProtect = false, target = 20, simulations = 100000) {
            const probabilities = getProbabilities(true);
            const pointsPerBillion = parseFloat(document.getElementById('pointsPerBillion').value);
            const scrollCosts = {};
            for (let star = 15; star <= 20; star++) {
                scrollCosts[star] = parseFloat(document.getElementById(`scroll${star}Maple`).value) * pointsPerBillion / 1e8;
            }
            const equipCompensationCost = parseFloat(document.getElementById('equipCompensationMaple').value) * pointsPerBillion / 1e8;
            const upgradeCost = 9;
            const protectCost = 50;

            const totalCosts = [];
            const totalDestroys = [];
            let logContent = `模擬策略：起始買${startStar}星卷，若破壞後買${restartStar}星卷` +
                            (buyBackThreshold !== null ? `，下降到${buyBackThreshold}星買回${startStar}星` : '') +
                            (protectStart !== null ? `，從${protectStart}星開始防破壞` : '') +
                            (specialProtect ? `，僅在19星及19掉18時防破壞` : '（無防破壞）') + '\n\n';

            const allCosts = [];
            for (let sim = 0; sim < simulations; sim++) {
                let totalCost = 0;
                let destroyCount = 0;
                let currentStar = startStar;
                totalCost += scrollCosts[startStar];
                let consecutiveDrops = 0;
                const path = [`初始購買星力${startStar}強化卷 (成本: ${scrollCosts[startStar].toFixed(2)} 楓點, 目前總成本: ${totalCost.toFixed(2)})`];

                while (currentStar < target) {
                    const useProtect = (specialProtect && (currentStar === 19 || (currentStar === 18 && consecutiveDrops > 0))) ||
                                       (protectStart !== null && currentStar >= protectStart);
                    if (consecutiveDrops >= 2) {
                        const cost = upgradeCost;
                        totalCost += cost;
                        if (sim === 0) {
                            path.push(`${currentStar}升${currentStar + 1} 成功 [連掉補償] (成本: ${cost} 楓點, 目前總成本: ${totalCost.toFixed(2)})`);
                        }
                        currentStar += 1;
                        consecutiveDrops = 0;
                        continue;
                    }

                    const cost = useProtect ? protectCost : upgradeCost;
                    totalCost += cost;

                    const outcome = Math.random();
                    const p_s = probabilities[currentStar].success;
                    const p_d = probabilities[currentStar].destroy;
                    const p_drop = probabilities[currentStar].drop;

                    if (outcome < p_s) {
                        if (sim === 0) {
                            path.push(`${currentStar}升${currentStar + 1} 成功 (成本: ${cost} 楓點${useProtect ? ' [防破壞]' : ''}, 目前總成本: ${totalCost.toFixed(2)})`);
                        }
                        currentStar += 1;
                        consecutiveDrops = 0;
                    } else if (outcome < p_s + p_d) {
                        if (useProtect) {
                            if (currentStar > 15) {
                                const nextStar = currentStar - 1;
                                const buyBack = buyBackThreshold !== null && nextStar <= buyBackThreshold;
                                if (sim === 0) {
                                    if (buyBack) {
                                        path.push(`${currentStar}升${currentStar + 1} 失敗，防破壞掉至${nextStar}，買回${startStar}星 (成本: ${cost} + ${scrollCosts[startStar].toFixed(2)} 楓點 [防破壞], 目前總成本: ${totalCost.toFixed(2)})`);
                                    } else {
                                        path.push(`${currentStar}升${currentStar + 1} 失敗，防破壞掉至${nextStar} (成本: ${cost} 楓點 [防破壞], 目前總成本: ${totalCost.toFixed(2)})`);
                                    }
                                }
                                currentStar = nextStar;
                                consecutiveDrops += 1;
                                if (buyBack) {
                                    totalCost += scrollCosts[startStar];
                                    currentStar = startStar;
                                    consecutiveDrops = 0;
                                }
                            } else {
                                if (sim === 0) {
                                    path.push(`${currentStar}升${currentStar + 1} 失敗，維持 (成本: ${cost} 楓點 [防破壞], 目前總成本: ${totalCost.toFixed(2)})`);
                                }
                                consecutiveDrops = 0;
                            }
                        } else {
                            totalCost += equipCompensationCost + scrollCosts[restartStar];
                            destroyCount += 1;
                            if (sim === 0) {
                                path.push(`${currentStar}升${currentStar + 1} 破壞，回到12星，購買${restartStar}星 (成本: ${cost} + ${equipCompensationCost.toFixed(2)} + ${scrollCosts[restartStar].toFixed(2)} 楓點, 目前總成本: ${totalCost.toFixed(2)})`);
                            }
                            currentStar = restartStar;
                            consecutiveDrops = 0;
                        }
                    } else if (outcome < p_s + p_d + p_drop) {
                        const nextStar = currentStar - 1;
                        const buyBack = buyBackThreshold !== null && nextStar <= buyBackThreshold;
                        if (sim === 0) {
                            if (buyBack) {
                                path.push(`${currentStar}升${currentStar + 1} 失敗，下滑至${nextStar}，買回${startStar}星 (成本: ${cost} + ${scrollCosts[startStar].toFixed(2)} 楓點${useProtect ? ' [防破壞]' : ''}, 目前總成本: ${totalCost.toFixed(2)})`);
                            } else {
                                path.push(`${currentStar}升${currentStar + 1} 失敗，下滑至${nextStar} (成本: ${cost} 楓點${useProtect ? ' [防破壞]' : ''}, 目前總成本: ${totalCost.toFixed(2)})`);
                            }
                        }
                        currentStar = nextStar;
                        consecutiveDrops += 1;
                        if (buyBack) {
                            totalCost += scrollCosts[startStar];
                            currentStar = startStar;
                            consecutiveDrops = 0;
                        }
                    } else {
                        if (sim === 0) {
                            path.push(`${currentStar}升${currentStar + 1} 失敗，維持 (成本: ${cost} 楓點${useProtect ? ' [防破壞]' : ''}, 目前總成本: ${totalCost.toFixed(2)})`);
                        }
                        consecutiveDrops = 0;
                    }
                }

                allCosts.push(totalCost);
                totalCosts.push(totalCost);
                totalDestroys.push(destroyCount);

                if (sim === 0) {
                    logContent += "單次模擬路徑與總成本：\n" + path.join('\n') + `\n總成本 = ${totalCost.toFixed(2)} 楓點，破壞次數 = ${destroyCount} 次\n`;
                }
            }

            const avgCost = totalCosts.reduce((a, b) => a + b, 0) / simulations;
            const avgDestroys = totalDestroys.reduce((a, b) => a + b, 0) / simulations;

            allCosts.sort((a, b) => a - b);
            totalDestroys.sort((a, b) => a - b);
            const percentiles = {
                'P10': allCosts[Math.floor(simulations * 0.10)],
                'P25': allCosts[Math.floor(simulations * 0.25)],
                'P50': allCosts[Math.floor(simulations * 0.50)],
                'P75': allCosts[Math.floor(simulations * 0.75)],
                'P90': allCosts[Math.floor(simulations * 0.90)]
            };
            const destroyPercentiles = {
                'P10': totalDestroys[Math.floor(simulations * 0.10)],
                'P25': totalDestroys[Math.floor(simulations * 0.25)],
                'P50': totalDestroys[Math.floor(simulations * 0.50)],
                'P75': totalDestroys[Math.floor(simulations * 0.75)],
                'P90': totalDestroys[Math.floor(simulations * 0.90)]
            };

            return [avgCost, avgDestroys, percentiles, destroyPercentiles, logContent];
        }

        // 更新日誌顯示
        function updateLog() {
            const select = document.getElementById('strategySelect');
            const selectedStrategy = select.value;
            document.getElementById('log').value = strategyLogs[selectedStrategy] || '';
        }

        // 主模擬函數
        function runSimulation() {
            const pointsPerBillion = parseFloat(document.getElementById('pointsPerBillion').value);
            const scrollCosts = {};
            for (let star = 15; star <= 20; star++) {
                scrollCosts[star] = parseFloat(document.getElementById(`scroll${star}Maple`).value) * pointsPerBillion / 1e8;
            }
            const equipCompensationCost = parseFloat(document.getElementById('equipCompensationMaple').value) * pointsPerBillion / 1e8;

            let output = "=== 程式輸入條件 ===\n";
            output += "目標星數：0星到20星\n";
            output += "活動狀態：啟用（15星強化成功率100%）\n";
            output += "星卷價格（楓幣）：\n";
            for (let star = 15; star <= 20; star++) {
                output += `${star}星：${parseFloat(document.getElementById(`scroll${star}Maple`).value).toLocaleString()} 楓幣\n`;
            }
            output += "\n楓點與楓幣換算：\n";
            output += `換算比例：1億楓幣 = ${pointsPerBillion} 楓點\n`;
            output += "\n星卷價格（轉換後，楓點）：\n";
            for (let star = 15; star <= 20; star++) {
                output += `${star}星：${scrollCosts[star].toFixed(2)} 楓點\n`;
            }
            output += "\n普通強化成本：9 楓點（不防爆設定）\n";
            output += "防破壞強化成本：50 楓點（破壞改為掉星，15星維持）\n";
            output += `裝備補償成本（破壞時）：${equipCompensationCost.toFixed(2)} 楓點\n`;
            output += "成本已包含裝備破壞後拿裝備修復價格（楓幣楓點換算）\n";
            output += "模擬次數：每個策略100,000次\n";
            output += "=================\n";

            const results = {};
            strategyLogs = {}; // 重置日誌儲存
            const protectOptionsBase = [null, 15, 16, 17, 18, 19];

            for (let startStar of [15, 16, 17, 18, 19]) {
                const buyBackOptions = [null];
                for (let i = 15; i < startStar; i++) {
                    buyBackOptions.push(i);
                }
                for (let buyBackThreshold of buyBackOptions) {
                    const protectOptions = buyBackThreshold === null ? protectOptionsBase : protectOptionsBase.filter(p => p === null || p > buyBackThreshold);
                    for (let protectStart of protectOptions) {
                        const strategyKey = `${startStar}_protect_${protectStart === null ? 'none' : protectStart}_buyback_${buyBackThreshold === null ? 'none' : buyBackThreshold}`;
                        if (results[strategyKey]) continue;

                        const desc = `起始買${startStar}星卷，若破壞後買${startStar}星卷` +
                                     (buyBackThreshold !== null ? `，下降到${buyBackThreshold}星買回${startStar}星` : '') +
                                     (protectStart !== null ? `，從${protectStart}星開始防破壞` : '（無防破壞）');
                        output += `\n模擬策略：${desc}\n`;
                        const [avgCost, avgDestroys, percentiles, destroyPercentiles, logContent] = simulateFromStart(startStar, startStar, protectStart, buyBackThreshold);
                        results[strategyKey] = [avgCost, avgDestroys, percentiles, destroyPercentiles, desc];
                        strategyLogs[desc] = logContent;

                        output += `平均成本 ${avgCost.toFixed(2)} 楓點 | 成本分位數 ${Object.entries(percentiles).map(([k, v]) => `${k}: ${v.toFixed(2)}`).join(', ')}\n`;
                        const destroyNonZero = Object.values(destroyPercentiles).some(v => v > 0);
                        output += `平均破壞次數 ${avgDestroys.toFixed(2)} 次${destroyNonZero ? ` | 破壞次數分位數 ${Object.entries(destroyPercentiles).map(([k, v]) => `${k}: ${v.toFixed(2)}`).join(', ')}` : ''}\n`;
                        output += `模擬路徑已記錄\n`;
                    }
                }
            }

            // 特殊策略
            for (let startStar of [15, 16, 17, 18, 19]) {
                const desc = `起始買${startStar}星卷，若破壞後買${startStar}星卷，僅在19星及19掉18時防破壞`;
                output += `\n模擬策略：${desc}\n`;
                const [avgCost, avgDestroys, percentiles, destroyPercentiles, logContent] = simulateFromStart(startStar, startStar, null, null, true);
                results[`${startStar}_protect_special_buyback_none`] = [avgCost, avgDestroys, percentiles, destroyPercentiles, desc];
                strategyLogs[desc] = logContent;
                output += `平均成本 ${avgCost.toFixed(2)} 楓點 | 成本分位數 ${Object.entries(percentiles).map(([k, v]) => `${k}: ${v.toFixed(2)}`).join(', ')}\n`;
                const destroyNonZero = Object.values(destroyPercentiles).some(v => v > 0);
                output += `平均破壞次數 ${avgDestroys.toFixed(2)} 次${destroyNonZero ? ` | 破壞次數分位數 ${Object.entries(destroyPercentiles).map(([k, v]) => `${k}: ${v.toFixed(2)}`).join(', ')}` : ''}\n`;
                output += `模擬路徑已記錄\n`;
            }

            // 直接買20星
            const desc20 = "起始買20星卷";
            output += `\n模擬策略：${desc20}\n`;
            const avgCost20 = scrollCosts[20];
            const avgDestroys20 = 0;
            const percentiles20 = { 'P10': avgCost20, 'P25': avgCost20, 'P50': avgCost20, 'P75': avgCost20, 'P90': avgCost20 };
            const destroyPercentiles20 = { 'P10': 0, 'P25': 0, 'P50': 0, 'P75': 0, 'P90': 0 };
            results["20_protect_none_buyback_none"] = [avgCost20, avgDestroys20, percentiles20, destroyPercentiles20, desc20];
            strategyLogs[desc20] = `模擬策略：${desc20}\n\n單次模擬路徑與總成本：\n初始購買星力20強化卷 (成本: ${scrollCosts[20].toFixed(2)} 楓點, 目前總成本: ${scrollCosts[20].toFixed(2)})\n總成本 = ${scrollCosts[20].toFixed(2)} 楓點，破壞次數 = 0 次\n`;
            output += `平均成本 ${avgCost20.toFixed(2)} 楓點 | 成本分位數 ${Object.entries(percentiles20).map(([k, v]) => `${k}: ${v.toFixed(2)}`).join(', ')}\n`;
            output += `平均破壞次數 ${avgDestroys20.toFixed(2)} 次\n`;
            output += `模擬路徑已記錄\n`;

            // 所有模擬情境
            output += "\n=== 所有模擬情境 ===\n";
            let count = 0;
            const sortedResults = Object.entries(results).sort((a, b) => {
                const partsA = a[0].split('_protect_');
                const partsB = b[0].split('_protect_');
                const startStarA = parseInt(partsA[0]);
                const startStarB = parseInt(partsB[0]);
                const restA = partsA[1].split('_buyback_');
                const restB = partsB[1].split('_buyback_');
                const protectA = restA[0] === 'none' ? -1 : (restA[0] === 'special' ? 100 : parseInt(restA[0]));
                const protectB = restB[0] === 'none' ? -1 : (restB[0] === 'special' ? 100 : parseInt(restB[0]));
                const buyBackA = restA[1] === 'none' ? -1 : parseInt(restA[1]);
                const buyBackB = restB[1] === 'none' ? -1 : parseInt(restB[1]);
                return startStarA - startStarB || protectA - protectB || buyBackA - buyBackB || a[1][0] - b[1][0];
            });
            for (let [strategyKey, [avgCost, , , , desc]] of sortedResults) {
                count++;
                output += `${count}. ${desc}\n`;
            }

            // 前三佳策略
            output += "\n=== 前三佳策略 ===\n";
            const topStrategies = Object.entries(results).sort((a, b) => a[1][0] - b[1][0]).slice(0, 3);
            const strategyLabels = ["最佳策略", "次佳策略", "第三佳策略"];
            for (let i = 0; i < topStrategies.length; i++) {
                const [strategyKey, [avgCost, avgDestroys, percentiles, destroyPercentiles, desc]] = topStrategies[i];
                output += `${strategyLabels[i]}：${desc}\n`;
                output += `平均成本 ${avgCost.toFixed(2)} 楓點 | 成本分位數 ${Object.entries(percentiles).map(([k, v]) => `${k}: ${v.toFixed(2)}`).join(', ')}\n`;
                const destroyNonZero = Object.values(destroyPercentiles).some(v => v > 0);
                output += `平均破壞次數 ${avgDestroys.toFixed(2)} 次${destroyNonZero ? ` | 破壞次數分位數 ${Object.entries(destroyPercentiles).map(([k, v]) => `${k}: ${v.toFixed(2)}`).join(', ')}` : ''}\n\n`;
            }

            document.getElementById('results').textContent = output;

            // 填充下拉選單
            const select = document.getElementById('strategySelect');
            select.innerHTML = '<option value="">請選擇策略</option>'; // 重置選單
            for (let desc of Object.keys(strategyLogs)) {
                const option = document.createElement('option');
                option.value = desc;
                option.textContent = desc;
                select.appendChild(option);
            }
            // 預設顯示第一個策略的日誌
            if (Object.keys(strategyLogs).length > 0) {
                select.value = Object.keys(strategyLogs)[0];
                document.getElementById('log').value = strategyLogs[Object.keys(strategyLogs)[0]];
            }
        }
    </script>
</body>
</html>
